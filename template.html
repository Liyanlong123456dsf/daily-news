<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style type="text/tailwindcss">
        @layer base {
            body {
                font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
                background-color: #f8f9fa;
            }
            .prose h2 {
                @apply text-2xl font-bold text-gray-900 mt-12 mb-6 pb-3 border-b-2 border-gray-200;
            }
            .prose h3 {
                @apply text-xl font-semibold text-gray-800 mt-10 mb-4;
            }
            .prose h4 {
                @apply text-lg font-semibold text-gray-700 mt-6 mb-3;
            }
            .prose p {
                @apply text-gray-700 leading-relaxed mb-4;
            }
            .prose a {
                @apply text-blue-600 hover:text-blue-800 font-medium transition-colors;
            }
            .prose ul {
                @apply list-none pl-0 space-y-4;
            }
            .prose li {
                @apply text-gray-700 leading-relaxed;
            }
            .news-card {
                @apply bg-white rounded-xl p-6 shadow-sm border border-gray-100 hover:shadow-md transition-shadow;
            }
            .news-card h3 {
                @apply text-lg font-semibold text-gray-900 mt-0 mb-2;
            }
            .news-card p {
                @apply text-gray-600 mb-0;
            }
            .section-number {
                @apply inline-flex items-center justify-center w-8 h-8 rounded-lg bg-blue-600 text-white text-sm font-bold mr-3;
            }
            .github-item {
                @apply flex items-start space-x-3 p-4 bg-gray-50 rounded-lg border border-gray-100;
            }
            .github-icon {
                @apply w-5 h-5 text-gray-700 mt-0.5 flex-shrink-0;
            }
            .tag {
                @apply inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800;
            }
        }
    </style>
</head>
<body class="antialiased">
    <!-- Top Navigation -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center space-x-3">
                    <div class="w-8 h-8 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-lg">
                        📰
                    </div>
                    <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-gray-900 to-gray-600">
                        每日早报
                    </span>
                </div>
                <div class="text-sm text-gray-500 font-medium">
                    {{DATE}}
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="bg-white border-b border-gray-200">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12 text-center">
            <div class="inline-flex items-center px-3 py-1 rounded-full bg-blue-50 text-blue-700 text-sm font-medium mb-4">
                <span class="w-2 h-2 bg-blue-500 rounded-full mr-2 animate-pulse"></span>
                今日已更新
            </div>
            <h1 class="text-4xl sm:text-5xl font-bold text-gray-900 tracking-tight mb-4">
                📰 每日早报
            </h1>
            <p class="text-xl text-gray-500 font-medium">
                {{DATE}}
            </p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="prose prose-lg max-w-none">
            {{CONTENT}}
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 mt-16">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="flex flex-col sm:flex-row justify-between items-center space-y-4 sm:space-y-0">
                <p class="text-sm text-gray-500">
                    数据来源：央视新闻、中新网、财联社、钛媒体、新浪财经、GitHub
                </p>
                <p class="text-sm text-gray-400">
                    由 AI 自动生成 · {{DATE}}
                </p>
            </div>
        </div>
    </footer>
</body>
</html>
